    - <script src="/js/buttondown.js"></script>

# Open Graph
Open_Graph_meta:
  enable: true
  option:

# 相关推荐
related_post:
  enable: false  # 禁用，由 scripts/fix-pagination.js 自定义生成
  limit: 6
  date_type: created



















# 自定义HTML注入
