name: Send Newsletter

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Newsletter 模式'
        required: true
        type: choice
        options:
          - latest
          - weekly
          - monthly
        default: latest
      test_mode:
        description: '测试模式（只发送给自己）'
        required: false
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        npm install rss-parser node-fetch
    
    - name: Generate newsletter content
      run: |
        node .github/scripts/generate-newsletter.js ${{ github.event.inputs.mode }}
    
    - name: Send newsletter
      env:
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        NEWSLETTER_MODE: ${{ github.event.inputs.mode }}
        TEST_MODE: ${{ github.event.inputs.test_mode }}
      run: node .github/scripts/send-newsletter.js
