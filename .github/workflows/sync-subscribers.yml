name: Sync Buttondown Subscribers

on:
  # 手动触发
  workflow_dispatch:
  
  # 每天自动同步一次（北京时间早上8点）
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Sync subscribers from Buttondown
      env:
        BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
      run: node .github/scripts/sync-buttondown.js
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 检查是否有变化
        if git diff --quiet .github/data/subscribers.json; then
          echo "No changes to subscribers.json"
          exit 0
        fi
        
        git add .github/data/subscribers.json
        git commit -m "Auto-sync: Update subscribers from Buttondown [skip ci]"
        git push
      continue-on-error: true
