name: Sync Buttondown Subscribers

on:
  # 手动触发
  workflow_dispatch:
  
  # 每天自动同步一次（北京时间早上8点）
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Sync subscribers from Buttondown
      env:
        BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
      run: |
        node .github/scripts/sync-buttondown.js
        
        # 将订阅者数据保存为 GitHub Secret（通过输出）
        echo "SUBSCRIBERS_COUNT=$(cat .github/data/subscribers.json | jq 'length')" >> $GITHUB_ENV
    
    - name: Update subscribers secret
      uses: gliech/create-github-secret-action@v1
      with:
        name: SUBSCRIBERS_DATA
        value: ${{ steps.sync.outputs.subscribers }}
        pa_token: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
    
    - name: Clean up local file (防止泄露)
      run: |
        # 保留空文件占位
        echo '[]' > .github/data/subscribers.json
        echo "✅ Cleaned up local subscribers file"
